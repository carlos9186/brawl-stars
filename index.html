
<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Insegnare a giocare</title>
  <style>
    :root { --orange: #ff7f00; --orange-2: #ff9a3c; }
    html, body { height: 100%; margin: 0; }
    body {
      background: linear-gradient(180deg, var(--orange), var(--orange-2));
      color: #fff;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    .container {
      max-width: 900px;
      width: calc(100% - 2rem);
      padding: 2rem;
      text-align: center;
      background: rgba(0,0,0,0.06);
      border-radius: 12px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.18);
    }
    h1 { font-size: 2.25rem; margin: 0 0 0.5rem; text-transform: capitalize; }
    p { font-size: 1.05rem; margin: 0; line-height: 1.5; }
    footer { margin-top: 1.25rem; font-size: 0.9rem; opacity: 0.95; }
    @media (max-width: 480px) {
      h1 { font-size: 1.5rem; }
      .container { padding: 1rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Insegnare a giocare ai nuovi giocatori</h1>
    <p>Benvenuto! Questa pagina è pensata per guidare i nuovi giocatori attraverso le basi del gioco: controlli, obiettivi e consigli iniziali.</p>
    <footer>Scorri per iniziare — consigli rapidi per principianti.</footer>
  </div>
</body>
</html>
